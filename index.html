<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="keywords" content="md,markdown,markdown-editor,wechat,official-account,公众号,模板" />
    <meta name="description" content="Wechat Markdown Editor | 一款高度简洁的微信 Markdown 编辑器" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <title>微信 Markdown 编辑器 Diy by fireworld 2025</title>
    <link rel="shortcut icon" href="/static/png/md-favicon-BUe6jSmB.png" />
    <style>
      .loading {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 100vw;
        height: 100vh;
        font-size: 18px;
      }

      .loading::before {
        content: url('/static/png/md-favicon-BUe6jSmB.png');
        width: 100px;
        height: 100px;
        margin-bottom: 26px;
      }

      .loading.dark {
        color: #ffffff;
        background-color: #141414;
      }

      .loading .txt {
        position: absolute;
        bottom: 10%;
      }

      .loading .txt::after {
        content: '...';
        animation: dots 1.5s steps(4, end) infinite;
      }

      @keyframes dots {
        0% {
          content: ' ';
        }
        25% {
          content: '.';
        }
        50% {
          content: '..';
        }
        75% {
          content: '...';
        }
      }
    </style>
    <script type="module" crossorigin src="/static/js/md-index-6S4GXFK_.js"></script>
    <link rel="modulepreload" crossorigin href="/static/js/md-lezer-bundle-C6jXe0By.js">
    <link rel="modulepreload" crossorigin href="/static/js/md-codemirror-7DFr6tM4.js">
    <link rel="modulepreload" crossorigin href="/static/js/md-vue-bundle-DnDnQJ7a.js">
    <link rel="modulepreload" crossorigin href="/static/js/md-utils--8WB-T50.js">
    <link rel="modulepreload" crossorigin href="/static/js/md-stream-B6Lmvbmt.js">
    <link rel="modulepreload" crossorigin href="/static/js/md-ui-DZ1amkqq.js">
    <link rel="modulepreload" crossorigin href="/static/js/md-aws-A8-UUKmc.js">
    <link rel="stylesheet" crossorigin href="/static/css/md-utils-DppCjOAl.css">
    <link rel="stylesheet" crossorigin href="/static/css/md-index-DJLd58yc.css">
  </head>

  <body>
    <noscript>
      <strong>Please enable JavaScript to continue.</strong>
    </noscript>
    <div id="app">
      <div class="loading">
        <strong>致力于让 Markdown 编辑更简单</strong>
        <p class="txt">正在加载编辑器</p>
        <p class="timeout-tip" style="display: none; color: #e53935; font-size: 16px; margin-top: 2em">
          加载时间过长，请尝试刷新页面或按 F12 查看控制台是否有异常信息
        </p>
      </div>
    </div>
    <script>
      const theme = localStorage.getItem('vueuse-color-scheme')
      if (theme === 'dark' || (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.querySelector('.loading').classList.add('dark')
      }
      setTimeout(() => {
        const tip = document.querySelector('.loading .timeout-tip')
        if (tip) {
          tip.style.display = 'block'
        }
      }, 30000)
    </script>
    <script>
      window.MathJax = {
        tex: { tags: 'ams' },
        svg: { fontCache: 'none' },
        options: {
          menuOptions: {
            settings: {
              enrich: false, // true to enable semantic-enrichment
              collapsible: false, // true to enable collapsible math
              speech: false, // true to enable speech generation
              braille: false, // true to enable Braille generation
              assistiveMml: false, // true to enable assistive MathML
            },
          },
        },
      }
    </script>
    <script
      id="MathJax-script"
      src="https://s4.zstatic.net/ajax/libs/mathjax/4.0.0/tex-svg.min.js"
      integrity="sha384-/sTw2V251WGs5ZvBcl9n8AbdOpbOV7ahBT+/w3spog95/TPHD4aXxjYhB6ay2/Xi"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://s4.zstatic.net/ajax/libs/mermaid/11.12.0/mermaid.min.js"
      integrity="sha384-o+g/BxPwhi0C3RK7oQBxQuNimeafQ3GE/ST4iT2BxVI4Wzt60SH4pq9iXVYujjaS"
      crossorigin="anonymous"
    ></script>
  </body>
  <!-- <script src="https://cdn-doocs.oss-cn-shenzhen.aliyuncs.com/gh/wechatsync/article-syncjs@latest/dist/main.js"></script> -->
</html>
