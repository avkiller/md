<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="keywords" content="md,markdown,markdown-editor,wechat,official-account,公众号,模板" />
    <meta name="description" content="Wechat Markdown Editor | 一款高度简洁的微信 Markdown 编辑器" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <title>微信 Markdown 编辑器 Diy by fireworld 2025</title>
    <link rel="shortcut icon" href="/src/assets/images/favicon.png" />
    <link rel="apple-touch-icon-precomposed" href="/src/assets/images/favicon.png" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
      }

      .loading {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-size: 18px;
        color: #171717;
        background-color: #ffffff;
      }

      html.dark .loading {
        color: #fafafa;
        background-color: #141414;
      }

      .loading::before {
        content: url('/favicon.png');
        width: 100px;
        height: 100px;
        margin-bottom: 26px;
      }

      .loading strong,
      .loading .txt {
        color: inherit;
      }

      .loading .txt {
        position: absolute;
        bottom: 10%;
      }

      .loading .txt::after {
        content: '...';
        animation: dots 1.5s steps(4, end) infinite;
      }

      @keyframes dots {
        0% {
          content: ' ';
        }
        25% {
          content: '.';
        }
        50% {
          content: '..';
        }
        75% {
          content: '...';
        }
      }
    </style>
    <script>
      ;(function () {
        const LOCALE_KEY = 'locale'

        window.__MD_LOADER_TEXT__ = {
          'zh-CN': {
            tagline: '致力于让 Markdown 编辑更简单',
            loading: '正在加载编辑器',
            timeout: '加载时间过长，请尝试刷新页面或按 F12 查看控制台是否有异常信息',
            title: '微信 Markdown 编辑器 | Doocs',
            description: 'Wechat Markdown Editor | 一款高度简洁的微信 Markdown 编辑器',
          },
          'en-US': {
            tagline: 'Making Markdown editing simpler',
            loading: 'Loading editor',
            timeout:
              'Loading is taking too long. Try refreshing the page or press F12 to check the console for errors.',
            title: 'WeChat Markdown Editor | Doocs',
            description: 'Wechat Markdown Editor | A minimalist Markdown editor for WeChat Official Accounts',
          },
        }

        function normalizeLocale(value) {
          if (value === 'zh-CN' || value === 'en-US') return value
          if (typeof value === 'string' && value.startsWith('zh')) return 'zh-CN'
          if (typeof value === 'string' && value.startsWith('en')) return 'en-US'
          return null
        }

        function detectFromNavigator() {
          const languages = navigator.languages?.length ? navigator.languages : [navigator.language]
          for (const language of languages) {
            const normalized = normalizeLocale(language)
            if (normalized) return normalized
          }
          return 'zh-CN'
        }

        function readLocaleFromLocalStorage() {
          try {
            return normalizeLocale(localStorage.getItem(LOCALE_KEY))
          } catch {
            return null
          }
        }

        window.__MD_APPLY_LOADER_LOCALE__ = function applyLoaderLocale(locale) {
          const text = window.__MD_LOADER_TEXT__[locale] || window.__MD_LOADER_TEXT__['zh-CN']
          document.documentElement.lang = locale
          document.title = text.title

          const description = document.querySelector('meta[name="description"]')
          if (description) description.setAttribute('content', text.description)

          const loader = document.getElementById('app-initial-loader')
          if (!loader) return

          const tagline = loader.querySelector('strong')
          const loading = loader.querySelector('.txt')
          const timeout = loader.querySelector('.timeout-tip')
          if (tagline) tagline.textContent = text.tagline
          if (loading) loading.textContent = text.loading
          if (timeout) timeout.textContent = text.timeout
        }

        window.__MD_BOOT_LOCALE__ = readLocaleFromLocalStorage() || detectFromNavigator()

        const theme = localStorage.getItem('vueuse-color-scheme') ?? 'auto'
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        if (theme === 'dark' || (theme === 'auto' && prefersDark)) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>

  <body>
    <noscript>
      <strong>Please enable JavaScript to continue.</strong>
    </noscript>
    <div id="app-initial-loader" class="loading">
      <strong></strong>
      <p class="txt"></p>
      <p class="timeout-tip" style="display: none; color: #e53935; font-size: 16px; margin-top: 2em"></p>
    </div>
    <script>
      const theme = localStorage.getItem('vueuse-color-scheme')
      if (theme === 'dark' || (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.querySelector('.loading').classList.add('dark')
      }
      setTimeout(() => {
        const tip = loader?.querySelector('.timeout-tip')
        if (tip) {
          tip.style.display = 'block'
        }
      }, 30000)
    </script>
    <script>
      window.MathJax = {
        tex: { tags: 'ams' },
        svg: { fontCache: 'none' },
        options: {
          menuOptions: {
            settings: {
              enrich: false, // true to enable semantic-enrichment
              collapsible: false, // true to enable collapsible math
              speech: false, // true to enable speech generation
              braille: false, // true to enable Braille generation
              assistiveMml: false, // true to enable assistive MathML
            },
          },
        },
      }
    </script>
    <script
      id="MathJax-script"
      src="https://s4.zstatic.net/ajax/libs/mathjax/4.0.0/tex-svg.min.js"
      integrity="sha384-/sTw2V251WGs5ZvBcl9n8AbdOpbOV7ahBT+/w3spog95/TPHD4aXxjYhB6ay2/Xi"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="/src/sidepanel.ts"></script>
  </body>
  <!-- <script src="https://cdn-doocs.oss-cn-shenzhen.aliyuncs.com/gh/wechatsync/article-syncjs@latest/dist/main.js"></script> -->
</html>
